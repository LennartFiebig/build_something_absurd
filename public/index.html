<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Quiz – Mitspielen</title>
<link rel="stylesheet" href="/style.css" />
</head>
<body>
<div id="app">
  <section id="join" class="card">
    <h1>Quiz</h1>
    <p>Gib deinen Vornamen ein, um mitzuspielen.</p>
    <form id="join-form">
      <input id="name" autocomplete="off" placeholder="Vorname" maxlength="20" required />
      <button type="submit">Mitspielen</button>
    </form>
    <p id="join-error" class="error"></p>
  </section>

  <section id="waiting" class="card hidden">
    <h2>Hallo, <span id="me"></span>!</h2>
    <p>Warte auf den Start des Quiz…</p>
    <h3>Bereits dabei:</h3>
    <ul id="players"></ul>
  </section>

  <section id="question" class="card hidden">
    <div class="qheader">
      <span id="qindex"></span>
      <span id="timer"></span>
    </div>
    <h2 id="qtext"></h2>
    <div id="answers" class="answers"></div>
    <p id="answered-msg" class="hidden">Antwort gespeichert ✔</p>
  </section>

  <section id="reveal" class="card hidden">
    <h2 id="reveal-title"></h2>
    <p id="reveal-points"></p>
    <h3>Leaderboard</h3>
    <ol id="leaderboard"></ol>
    <p class="hint">Warte auf die nächste Frage…</p>
  </section>

  <section id="finished" class="card hidden">
    <h2>Quiz beendet! 🎉</h2>
    <h3>Endstand</h3>
    <ol id="final-leaderboard"></ol>
  </section>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();
const $ = (id) => document.getElementById(id);
const show = (id) => {
  ['join','waiting','question','reveal','finished'].forEach(s => $(s).classList.toggle('hidden', s !== id));
};

let myName = null;
let timerInterval = null;

$('join-form').addEventListener('submit', (e) => {
  e.preventDefault();
  const name = $('name').value.trim();
  socket.emit('player:join', name, (resp) => {
    if (!resp.ok) {
      $('join-error').textContent = resp.error;
      return;
    }
    myName = resp.name;
    $('me').textContent = myName;
    show('waiting');
  });
});

socket.on('lobby:update', (players) => {
  const ul = $('players');
  ul.innerHTML = '';
  players.forEach(p => {
    const li = document.createElement('li');
    li.textContent = p.name;
    ul.appendChild(li);
  });
});

socket.on('question:start', (data) => {
  show('question');
  $('qindex').textContent = `Frage ${data.index + 1} / ${data.total}`;
  $('qtext').textContent = data.question;
  $('answered-msg').classList.add('hidden');

  const answersEl = $('answers');
  answersEl.innerHTML = '';
  const colors = ['c1','c2','c3','c4'];
  data.answers.forEach((a, i) => {
    const btn = document.createElement('button');
    btn.className = `answer ${colors[i % colors.length]}`;
    btn.textContent = a;
    btn.addEventListener('click', () => {
      Array.from(answersEl.children).forEach(b => b.disabled = true);
      btn.classList.add('selected');
      socket.emit('player:answer', i, (resp) => {
        $('answered-msg').classList.remove('hidden');
      });
    });
    answersEl.appendChild(btn);
  });

  const endsAt = Date.now() + data.timeMs;
  if (timerInterval) clearInterval(timerInterval);
  const update = () => {
    const left = Math.max(0, endsAt - Date.now());
    $('timer').textContent = `${Math.ceil(left / 1000)}s`;
    if (left <= 0) clearInterval(timerInterval);
  };
  update();
  timerInterval = setInterval(update, 200);
});

socket.on('question:reveal', (data) => {
  if (timerInterval) clearInterval(timerInterval);
  show('reveal');
  $('reveal-title').textContent = 'Zeit abgelaufen!';
  const me = data.leaderboard.find(p => p.name === myName);
  $('reveal-points').textContent = me ? `Dein Punktestand: ${me.score}` : '';
  const ol = $('leaderboard');
  ol.innerHTML = '';
  data.leaderboard.forEach(p => {
    const li = document.createElement('li');
    li.innerHTML = `<span>${p.name}</span><strong>${p.score}</strong>`;
    if (p.name === myName) li.classList.add('me');
    ol.appendChild(li);
  });
});

socket.on('game:finished', (data) => {
  if (timerInterval) clearInterval(timerInterval);
  show('finished');
  const ol = $('final-leaderboard');
  ol.innerHTML = '';
  data.leaderboard.forEach((p, i) => {
    const li = document.createElement('li');
    const medal = i === 0 ? '🥇 ' : i === 1 ? '🥈 ' : i === 2 ? '🥉 ' : '';
    li.innerHTML = `<span>${medal}${p.name}</span><strong>${p.score}</strong>`;
    if (p.name === myName) li.classList.add('me');
    ol.appendChild(li);
  });
});

socket.on('game:reset', () => {
  myName = null;
  $('name').value = '';
  $('join-error').textContent = '';
  show('join');
});
</script>
</body>
</html>
