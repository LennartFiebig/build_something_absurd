<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Quiz – Mitspielen</title>
<link rel="stylesheet" href="/style.css" />
</head>
<body>
<div id="app">
  <section id="join" class="card">
    <h1>Quiz</h1>
    <p>Gib deinen Vornamen ein, um mitzuspielen.</p>
    <form id="join-form">
      <input id="name" autocomplete="off" placeholder="Vorname" maxlength="20" required />
      <button type="submit">Mitspielen</button>
    </form>
    <p id="join-error" class="error"></p>
  </section>

  <section id="waiting" class="card hidden">
    <h2>Hallo, <span id="me"></span>!</h2>
    <p>Warte auf den Start des Quiz…</p>
    <h3>Bereits dabei:</h3>
    <ul id="players"></ul>
  </section>

  <section id="question" class="card hidden">
    <div class="qheader">
      <span id="qindex"></span>
      <span id="timer"></span>
    </div>
    <h2 id="qtext"></h2>
    <div id="answers" class="answers"></div>
    <p id="answered-msg" class="hidden">Antwort gespeichert ✔</p>
  </section>

  <section id="reveal" class="card hidden">
    <h2 id="reveal-title">Auflösung</h2>
    <p id="reveal-points"></p>
    <h3>Leaderboard</h3>
    <ol id="leaderboard"></ol>
    <p class="hint">Warte auf die nächste Frage…</p>
  </section>

  <section id="finished" class="card hidden">
    <h2>Quiz beendet! 🎉</h2>
    <h3>Endstand</h3>
    <ol id="final-leaderboard"></ol>
  </section>
</div>

<script>
const $ = (id) => document.getElementById(id);
const show = (id) => {
  ['join','waiting','question','reveal','finished'].forEach(s => $(s).classList.toggle('hidden', s !== id));
};

const STORAGE_KEY = 'kahoot:player';
let player = JSON.parse(sessionStorage.getItem(STORAGE_KEY) || 'null');
let lastQuestionIndex = -1;
let lastPhase = null;
let answeredFor = -1;
let timerInterval = null;

async function api(path, body) {
  const res = await fetch(path, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body || {}),
  });
  return res.json();
}

$('join-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  $('join-error').textContent = '';
  const name = $('name').value.trim();
  const resp = await api('/api/join', { name });
  if (!resp.ok) {
    $('join-error').textContent = resp.error || 'Beitritt fehlgeschlagen.';
    return;
  }
  player = { id: resp.playerId, name: resp.name };
  sessionStorage.setItem(STORAGE_KEY, JSON.stringify(player));
  $('me').textContent = player.name;
  show('waiting');
  poll();
});

function renderQuestion(state) {
  const q = state.question;
  const isNew = q.index !== lastQuestionIndex;
  if (isNew) {
    lastQuestionIndex = q.index;
    answeredFor = -1;
    $('qindex').textContent = `Frage ${q.index + 1} / ${q.total}`;
    $('qtext').textContent = q.question;
    $('answered-msg').classList.add('hidden');

    const answersEl = $('answers');
    answersEl.innerHTML = '';
    const colors = ['c1','c2','c3','c4'];
    q.answers.forEach((a, i) => {
      const btn = document.createElement('button');
      btn.className = `answer ${colors[i % colors.length]}`;
      btn.textContent = a;
      btn.addEventListener('click', async () => {
        if (answeredFor === q.index) return;
        answeredFor = q.index;
        Array.from(answersEl.children).forEach(b => b.disabled = true);
        btn.classList.add('selected');
        await api('/api/answer', { playerId: player.id, choice: i });
        $('answered-msg').classList.remove('hidden');
      });
      answersEl.appendChild(btn);
    });
  }

  if (timerInterval) clearInterval(timerInterval);
  const endsAt = q.startedAt + q.timeMs;
  const update = () => {
    const left = Math.max(0, endsAt - Date.now());
    $('timer').textContent = `${Math.ceil(left / 1000)}s`;
    if (left <= 0) clearInterval(timerInterval);
  };
  update();
  timerInterval = setInterval(update, 200);

  show('question');
}

function renderReveal(state) {
  if (timerInterval) clearInterval(timerInterval);
  const me = state.me;
  $('reveal-points').textContent = me ? `Dein Punktestand: ${me.score}` : '';
  const ol = $('leaderboard');
  ol.innerHTML = '';
  state.players.forEach(p => {
    const li = document.createElement('li');
    li.innerHTML = `<span>${p.name}</span><strong>${p.score}</strong>`;
    if (player && p.name === player.name) li.classList.add('me');
    ol.appendChild(li);
  });
  show('reveal');
}

function renderFinished(state) {
  if (timerInterval) clearInterval(timerInterval);
  const ol = $('final-leaderboard');
  ol.innerHTML = '';
  state.players.forEach((p, i) => {
    const li = document.createElement('li');
    const medal = i === 0 ? '🥇 ' : i === 1 ? '🥈 ' : i === 2 ? '🥉 ' : '';
    li.innerHTML = `<span>${medal}${p.name}</span><strong>${p.score}</strong>`;
    if (player && p.name === player.name) li.classList.add('me');
    ol.appendChild(li);
  });
  show('finished');
}

function renderLobby(state) {
  const ul = $('players');
  ul.innerHTML = '';
  state.players.forEach(p => {
    const li = document.createElement('li');
    li.textContent = p.name;
    ul.appendChild(li);
  });
}

let inflight = false;
async function poll() {
  if (inflight) return;
  inflight = true;
  try {
    const url = player ? `/api/state?playerId=${encodeURIComponent(player.id)}` : '/api/state';
    const res = await fetch(url, { cache: 'no-store' });
    const state = await res.json();

    if (!player) {
      show('join');
      return;
    }

    if (!state.me) {
      sessionStorage.removeItem(STORAGE_KEY);
      player = null;
      show('join');
      $('join-error').textContent = 'Spiel wurde zurückgesetzt.';
      return;
    }

    if (state.phase !== lastPhase) lastPhase = state.phase;

    if (state.phase === 'lobby') {
      $('me').textContent = player.name;
      renderLobby(state);
      show('waiting');
    } else if (state.phase === 'question') {
      renderQuestion(state);
    } else if (state.phase === 'reveal') {
      renderReveal(state);
    } else if (state.phase === 'finished') {
      renderFinished(state);
    }
  } catch (e) {
    // ignore transient errors
  } finally {
    inflight = false;
  }
}

if (player) {
  show('waiting');
  $('me').textContent = player.name;
}
poll();
setInterval(poll, 1000);
</script>
</body>
</html>
